name: smarted
description: Voice-activated AI tutor (English/Urdu/Maths) powered by RAG.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Voice
  speech_to_text: ^7.0.0     # used for the wake word ("Hi Smarted") only
  flutter_tts: ^4.0.2
  noise_meter: ^5.0.2
  record: ^6.0.0             # records audio for backend Whisper transcription
  permission_handler: ^11.3.1
  vibration: ^2.0.0          # haptic feedback for blind users

  # UI
  cupertino_icons: ^1.0.8
  flutter_math_fork: ^0.7.2
  lottie: ^3.1.2
  google_fonts: ^6.2.1

  # State / data
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # Networking
  http: ^1.2.1
  dio: ^5.5.0+1

  # Files
  file_picker: ^8.0.6
  path_provider: ^2.1.3

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: false
  remove_alpha_ios: true
  image_path: "assets/icon.png"